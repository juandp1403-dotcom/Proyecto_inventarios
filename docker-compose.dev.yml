version: '3.8'

services:
  web:
    build: .
    container_name: inventarios_web_dev
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=run.py
      - FLASK_ENV=development
      - FLASK_DEBUG=1
    volumes:
      - .:/app
    networks:
      - inventarios_network
    restart: unless-stopped

networks:
  inventarios_network:
    driver: bridge
