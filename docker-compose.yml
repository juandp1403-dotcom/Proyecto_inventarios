version: '3.8'

services:
  web:
    build: .
    container_name: inventarios_web
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=run.py
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:///instance/site.db
      - SECRET_KEY=clave_secreta_para_produccion_cambiar_esta
    volumes:
      - inventarios_data:/app/instance
    networks:
      - inventarios_network
    restart: unless-stopped

volumes:
  inventarios_data:
    driver: local

networks:
  inventarios_network:
    driver: bridge
