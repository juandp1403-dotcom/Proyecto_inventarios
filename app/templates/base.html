<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Inventarios{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tus estilos -->
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap/css/estilos.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

    {% block head %}{% endblock %}
</head>

<body>

    
    {% block header %}
    <header class="app-header py-4 mb-4 shadow">
        <div class="container-fluid">
            <div class="row align-items-center justify-content-center">
                
                
                <div class="col-12 text-center">
                    <a href="/" class="text-decoration-none text-white d-flex align-items-center justify-content-center">
                        <i class="fas fa-boxes fa-2x me-3"></i>
                        <h1 class="h4 mb-0 fw-bold">Sistema de Inventarios</h1>
                    </a>
                </div>

                
                <div class="col-12 text-center mt-2">
                    {% block topbar %}
                    <div class="d-inline-block">
                        <span class="me-3 text-white">
                            Usuario: {{ current_user if current_user else 'Invitado' }}
                        </span>
                        <a href="/usuario/logout" class="btn btn-outline-light btn-sm">
                            Cerrar sesión
                        </a>
                    </div>
                    {% endblock %}
                </div>

            </div>
        </div>
    </header>
    {% endblock %}

   
    <main class="container-fluid px-4">
        {% block content %}{% endblock %}
    </main>

    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    {% block scripts %}{% endblock %}

</body>
</html>
