<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Inventarios{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-BTVe6MORQYdHBSHqBPnK3GpDk2V3k8Pz7t3+02rEHzJ0E7vhLtpu03lwW5VmkjJH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLKNl8f7JC41rd1zQlV6+WJz8rDCj5Z6BtqzqL6NlGMSL1Zn3hBqVKwO6t3r0f2MwJwF5eBQrZcN9aG5A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap/styles.css') }}">
    <style>
        body {
            background: white;
            font-family: 'Arial', sans-serif;
            color: #333;
        }
        .app-header {
            background: #28a745; /* Verde secundario */
            color: white;
            transition: background-color 0.3s ease;
        }
        .app-header:hover {
            background: #218838; /* Verde más oscuro en hover */
        }
        .app-sidebar {
            min-height: 100vh;
            background: #f8f9fa; /* Gris claro para sidebar */
            color: #333;
            border-right: 2px solid #28a745;
        }
        .app-sidebar a {
            color: #333;
            text-decoration: none;
            transition: color 0.3s ease, background-color 0.3s ease;
            padding: 10px;
            display: block;
        }
        .app-sidebar a:hover {
            color: white;
            background: #28a745;
            border-radius: 5px;
        }
        .btn-primary {
            background-color: #28a745;
            border-color: #28a745;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }
        .btn-primary:hover {
            background-color: #218838;
            border-color: #218838;
            transform: scale(1.05);
        }
        .card {
            border: 1px solid #28a745;
            transition: all 0.3s ease;
            border-radius: 10px;
        }
        .card:hover {
            box-shadow: 0 8px 16px rgba(40, 167, 69, 0.3);
            transform: translateY(-2px);
        }
        .card-action {
            min-height: 140px;
            transition: all 0.3s ease;
        }
        .card-action:hover {
            transform: translateY(-5px);
        }
        .btn {
            border-radius: 6px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .form-control {
            border-radius: 6px;
            border: 1px solid #ced4da;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: #28a745;
            box-shadow: 0 0 0 0.2rem rgba(40, 167, 69, 0.25);
        }
        .table th {
            background-color: #28a745;
            color: white;
        }
        .table tbody tr:hover {
            background-color: #f8f9fa;
        }
        .alert-success {
            background-color: #d4edda;
            border-color: #28a745;
            color: #155724;
        }
        .alert-danger {
            background-color: #f8d7da;
            border-color: #dc3545;
            color: #721c24;
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <header class="app-header py-4 mb-5 shadow">
        <div class="container-fluid">
            <div class="row align-items-center">
                <div class="col-md-6 text-center text-md-start">
                    <a href="/" class="text-decoration-none text-white">
                        <h1 class="h3 mb-0 fw-bold">Sistema de Inventarios</h1>
                    </a>
                </div>
                <div class="col-md-6 text-center text-md-end mt-3 mt-md-0">
                    {% block topbar %}
                    <div class="d-inline-block">
                        <span class="me-3 text-white">Usuario: {{ current_user if current_user else 'Invitado' }}</span>
                        <a href="/usuario/logout" class="btn btn-outline-light btn-sm px-3 py-1">Cerrar sesión</a>
                    </div>
                    {% endblock %}
                </div>
            </div>
        </div>
    </header>

    <main class="container-fluid px-4">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-VOhW4uJsRj1+H7gFprVudA98LqkU5Hn/Kw6U0c1Vb+05Pf4KQ3XWd8db5yOUv02X" crossorigin="anonymous"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
