{% extends 'base.html' %}

{% block title %}Crear Solicitud{% endblock %}

{% block content %}
<div class="row justify-content-center mb-5">
    <div class="col-lg-8">
        <div class="card shadow-sm">
            <div class="card-body text-center">
                <h2 class="card-title mb-4 fw-bold">Crear Solicitud</h2>
                <form method="post" action="{{ url_for('solicitud.crear_solicitud') }}">
                    <div class="mb-3">
                        <label for="justificacion" class="form-label">Justificación de la Solicitud</label>
                        <textarea class="form-control" id="justificacion" name="justificacion" rows="4" 
                                  placeholder="Describe por qué necesitas esta solicitud..." required></textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label for="id_ambiente" class="form-label">Ambiente</label>
                        <select class="form-select" id="id_ambiente" name="id_ambiente" required>
                            <option value="">Seleccionar ambiente...</option>
                            {% for ambiente in ambientes %}
                            <option value="{{ ambiente.id }}">{{ ambiente.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">Crear Solicitud</button>
                    </div>
                </form>
                
                <div class="mt-4">
                    <a href="{{ url_for('solicitud.listar_solicitudes') }}" class="btn btn-outline-secondary">Volver a la lista</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
