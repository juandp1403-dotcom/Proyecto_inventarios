<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Inventarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-BTVe6MORQYdHBSHqBPnK3GpDk2V3k8Pz7t3+02rEHzJ0E7vhLtpu03lwW5VmkjJH" crossorigin="anonymous">
  
</head>
<body>
    <div class="d-flex align-items-center justify-content-center min-vh-100">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-6">
                    <div class="card login-card shadow-sm">
                        <div class="card-body">
                            <h3 class="card-title text-center mb-4">Iniciar sesión</h3>
                            <form action="/usuario/login" method="post">
                                <div class="mb-3">
                                    <label for="email" class="form-label">Correo electrónico</label>
                                    <input type="email" class="form-control" id="email" name="email" placeholder="usuario@dominio.com" required>
                                </div>
                                <div class="mb-3">
                                    <label for="password" class="form-label">Contraseña</label>
                                    <input type="password" class="form-control" id="password" name="password" placeholder="********" required>
                                </div>
                                <div class="d-grid gap-2">
                                    <button type="submit" class="btn btn-primary">Entrar</button>
                                </div>
                            </form>
                            <hr>
                            <p class="text-center mb-3">¿No tienes cuenta? <button type="button" class="btn btn-link" onclick="toggleRegister()">Regístrate</button></p>
                            <div class="register-form" style="display: none;">
                                <h3 class="card-title text-center mb-4">Registrarse</h3>
                                <form action="/usuario/crear" method="post">
                                    <div class="mb-3">
                                        <label for="nombre" class="form-label">Nombre</label>
                                        <input type="text" id="nombre" name="nombre" class="form-control" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="email_reg" class="form-label">Correo electrónico</label>
                                        <input type="email" id="email_reg" name="email" class="form-control" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="password_reg" class="form-label">Contraseña</label>
                                        <input type="password" id="password_reg" name="password" class="form-control" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="rol" class="form-label">Rol</label>
                                        <select id="rol" name="rol" class="form-select" required>
                                            <option value="aprendiz">Aprendiz</option>
                                        </select>
                                    </div>
                                    <div class="d-grid gap-2">
                                        <button type="submit" class="btn btn-primary">Crear cuenta</button>
                                    </div>
                                </form>
                            </div>
                            <p class="text-center text-muted mb-0">Accede como aprendiz, instructor, auditor o revisor.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        function toggleRegister() {
            const registerForm = document.querySelector('.register-form');
            if (registerForm.style.display === 'none' || registerForm.style.display === '') {
                registerForm.style.display = 'block';
            } else {
                registerForm.style.display = 'none';
            }
        }
    </script>
</body>
</html>
