<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Inventarios</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css?v=1" rel="stylesheet" crossorigin="anonymous">
    
    <!-- TU CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login_style.css') }}">
</head>

<body>

<div class="login-page">
    <div class="container d-flex justify-content-center">
        
        <div class="card login-card shadow-lg border-0">
            <div class="card-body p-4">

                <h3 class="text-center mb-4">Iniciar Sesión</h3>

                <form action="{{ url_for('usuario.login_usuario') }}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Correo electrónico</label>
                        <input type="email" name="email" class="form-control" placeholder="usuario@dominio.com" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" name="password" class="form-control" placeholder="********" required>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Entrar</button>
                    </div>
                </form>

                <hr>

                <p class="text-center mb-0">
                    <span>¿No tienes cuenta?</span>
                    <a href="/usuario/crear" class="btn btn-link p-0">Registrarse como aprendiz</a>
                </p>

            </div>
        </div>

    </div>
</div>


</body>
</html>
