<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Inventarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-BTVe6MORQYdHBSHqBPnK3GpDk2V3k8Pz7t3+02rEHzJ0E7vhLtpu03lwW5VmkjJH" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap/styles.css') }}">
</head>
<body class="login-page">
    <div class="login-container">
        <h2>Iniciar sesión</h2>
        <form action="/usuario/login" method="post">
            <div class="login-form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" name="email" placeholder="usuario@dominio.com" required>
            </div>
            <div class="login-form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="********" required>
            </div>
            <button type="submit" class="btn-login">Entrar</button>
        </form>
        <div class="login-extra-links">
            <p>¿No tienes cuenta? <button type="button" onclick="toggleRegister()">Regístrate</button></p>
            <div class="register-form" style="display: none;">
                <h3>Registrarse</h3>
                <form action="/usuario/crear" method="post">
                    <div class="login-form-group">
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" name="nombre" required>
                    </div>
                    <div class="login-form-group">
                        <label for="email_reg">Correo electrónico</label>
                        <input type="email" id="email_reg" name="email" required>
                    </div>
                    <div class="login-form-group">
                        <label for="password_reg">Contraseña</label>
                        <input type="password" id="password_reg" name="password" required>
                    </div>
                    <div class="login-form-group">
                        <label for="rol">Rol</label>
                        <select id="rol" name="rol" required>
                            <option value="aprendiz">Aprendiz</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-login">Crear cuenta</button>
                </form>
            </div>
            <p>Accede como aprendiz, instructor, auditor o revisor.</p>
        </div>
    </div>
    <script>
        function toggleRegister() {
            const registerForm = document.querySelector('.register-form');
            if (registerForm.style.display === 'none' || registerForm.style.display === '') {
                registerForm.style.display = 'block';
            } else {
                registerForm.style.display = 'none';
            }
        }
    </script>
</body>
</html>
