{% extends 'base.html' %}

{% block title %}Ambiente {{ ambiente.nombre }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="card-title">{{ ambiente.nombre }}</h2>
                <p class="text-muted">{{ ambiente.tipo }} · {{ ambiente.ubicacion }}</p>
                <p>{{ ambiente.descripcion }}</p>
                <a href="/ambientes/{{ ambiente.id }}/inventario" class="btn btn-success">Ver inventario</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
